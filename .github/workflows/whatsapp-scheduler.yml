# Runs automatically on the DEFAULT branch only (merge this file to main/master).
# Schedule uses UTC. GitHub does not support cron faster than every 5 minutes.
# Repo → Settings → Secrets → APP_BASE_URL (e.g. https://crm.xcelppf.com) and CRON_SECRET (production).
# If the workflow never runs: Actions enabled? Default branch? Not a fork? Secrets set?

name: WhatsApp Scheduled Processor

on:
  schedule:
    # Every 5 minutes (UTC) — GitHub’s minimum reliable interval for scheduled workflows
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: whatsapp-scheduled-processor
  cancel-in-progress: false

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger scheduled WhatsApp processor
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "APP_BASE_URL secret is missing"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is missing"
            exit 1
          fi

          curl -fsSL -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_BASE_URL/api/cron/whatsapp-process-scheduled"
