# Runs automatically on the DEFAULT branch only (merge this file to main/master).
# Schedule uses UTC. GitHub’s minimum supported cron interval is every 5 minutes,
# but actual execution can be delayed 5–30 min during high load — this is a GitHub limitation.
# For precise per-minute scheduling use Supabase pg_cron or an external cron service instead.
# Repo → Settings → Secrets → APP_BASE_URL (e.g. https://crm.xcelppf.com) and CRON_SECRET.
# CRON_SECRET must match production CRON_SECRET or WHATSAPP_PROCESS_SCHEDULED_SECRET (either works; values are trimmed).
# If the workflow never runs: Actions enabled? Default branch? Not a fork? Secrets set?

name: WhatsApp Scheduled Processor

on:
  schedule:
    # Every 5 minutes (UTC) — GitHub’s minimum supported interval (*/1 is not reliable on GitHub)
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: whatsapp-scheduled-processor
  cancel-in-progress: false

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger scheduled WhatsApp processor
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "APP_BASE_URL secret is missing"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is missing"
            exit 1
          fi

          curl -fsSL -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_BASE_URL/api/cron/whatsapp-process-scheduled"
